name: Brew Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        formula:
          - cern-sso-cli
          - cernopendata-client
          - voms-clients
          - wlcg-voms
          - osg-ca-certificates
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          # Symlink the workspace to the Homebrew tap directory
          # This ensures brew sees the local files (including PR changes)
          # instead of cloning from upstream
          tap_root="$(brew --repo)/Library/Taps/${GITHUB_REPOSITORY%/*}"
          tap_path="$(brew --repo)/Library/Taps/${GITHUB_REPOSITORY}"
          mkdir -p "$tap_root"
          ln -s "$GITHUB_WORKSPACE" "$tap_path"

      - name: Trust formula
        run: |
          tap_name="${GITHUB_REPOSITORY/homebrew-/}"
          formula="${{ matrix.formula }}"
          brew trust --formula "${tap_name}/${formula}"

      - name: Install formula
        run: |
          brew install --build-from-source "${{ matrix.formula }}"

      - name: Test formula
        run: |
          brew test "${{ matrix.formula }}"
