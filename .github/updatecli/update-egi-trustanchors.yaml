scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      branch: "{{ .github.branch }}"

sources:
  certsVersion:
    name: "EGI-trustanchors Certificate Version"
    kind: shell
    spec:
      command: >-
        curl -sL http://repository.egi.eu/sw/production/cas/1/current/release.xml |
        sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p'

  tarballUrl:
    name: "EGI-trustanchors Tarball URL"
    kind: shell
    spec:
      command: >-
        echo "http://repository.egi.eu/sw/production/cas/1/current/tgz/igtf-preinstalled-bundle-classic.tar.gz"

  sha256Sum:
    name: "EGI-trustanchors SHA256 Sum"
    kind: shell
    spec:
      command: >-
        curl -sL "http://repository.egi.eu/sw/production/cas/1/current/tgz/igtf-preinstalled-bundle-classic.tar.gz" |
        shasum -a 256 | awk '{print $1}'

targets:
  updateFormula:
    name: Update EGI-trustanchors to {{ source `certsVersion` }}
    kind: file
    sourceid: certsVersion
    scmid: default
    spec:
      file: Formula/egi-trustanchors.rb
      content: |
        class EgiTrustanchors < Formula
          desc "CA certificates from EGI EUGridPMA"
          homepage "https://repository.egi.eu/sw/production/cas/1/current/"
          url "{{ source `tarballUrl` }}"
          sha256 "{{ source `sha256Sum` }}"
          version "{{ source `certsVersion` }}"

          def install
            (prefix/"etc/grid-security-emi/certificates").mkpath
            (etc/"grid-security-emi").mkpath

            cert_dir = prefix/"etc/grid-security-emi/certificates"

            system "tar", "xzf", cached_download

            if Dir.exist?("certificates")
              cp Dir["certificates/*"], cert_dir
            else
              cp Dir["*"], cert_dir
            end

            chmod 0644, Dir["#{cert_dir}/*"]
          end

          def caveats
            <<~EOS
              EGI-trustanchors certificates have been installed to:
                #{prefix}/etc/grid-security-emi/certificates

              These files are typically expected by grid tools to be in:
                /etc/grid-security-emi/certificates

              You have two options to make these certificates accessible:

              1. Symlink the certificates directory (recommended):
                 sudo mkdir -p /etc/grid-security-emi
                 sudo ln -sf #{prefix}/etc/grid-security-emi/certificates /etc/grid-security-emi/certificates

              2. Configure your grid tools to use this location directly:
                 export X509_CERT_DIR="#{prefix}/etc/grid-security-emi/certificates"
            EOS
          end

          test do
            cert_dir = prefix/"etc/grid-security-emi/certificates"
            assert_path_exists cert_dir

            cert_files_count = Dir["#{cert_dir}/*.0"].length
            assert cert_files_count > 50, "Expected at least 50 certificate files"

            assert_path_exists cert_dir/"CERN-Root-2.pem"

            cert_content = File.read(cert_dir/"CERN-Root-2.pem")
            assert_match(/BEGIN CERTIFICATE/, cert_content)

            assert_path_exists etc/"grid-security-emi"
          end
        end

actions:
  default:
    kind: github/pullrequest
    scmid: default
    title: Update EGI-trustanchors to "{{ source `certsVersion` }}"
    spec:
      automerge: false
      mergemethod: squash
      sourcebranch: update-egi-trustanchors-{{ source `certsVersion` }}
      description: |
        This automated PR updates the EGI-trustanchors to version {{ source `certsVersion` }}.

        * New version: {{ source `certsVersion` }}
        * Tarball URL: {{ source `tarballUrl` }}
        * SHA256: {{ source `sha256Sum` }}
      labels:
        - automation
        - dependencies
